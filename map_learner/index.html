<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Country Locations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
        }
        .info {
            background: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>Learn Country Locations</h1>
    <div class="info" id="info">Find: <span id="country-name">United States</span></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([20, 0], 2);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var countries = {
              "features": [

            {

                 "type": "Feature",

                  "properties": { "name": "United States" },

                   "geometry": {

                    "type": "Polygon",

                     "coordinates": [[

                          [-101.6015625, 40.97989806962013],

                           [-80.859375, 25.799891182088334],

                            [-66.09375, 44.96479793033104],

                             [-125.859375, 49.15296965617042],

                                       ]]
       }
 
         
 
         
        };
   ]
           }
       }
           ]
        };

        // Target country to find
        var targetCountry = "United States";
        document.getElementById('country-name').textContent = targetCountry;

        // Add GeoJSON layer to the map
        L.geoJSON(countries, {
            style: function(feature) {
                return {
                    fillColor: feature.properties.name === targetCountry ? 'blue' : 'grey',
                    weight: 1,
                    color: 'white',
                    fillOpacity: 0.5
                };
            },
            onEachFeature: function(feature, layer) {
                layer.on('click', function() {
                    if (feature.properties.name === targetCountry) {
                        alert("Correct! You found " + targetCountry);
                    } else {
                        alert("That's not " + targetCountry + ". Try again!");
                    }
                });
            }
        }).addTo(map);
    </script>
</body>
</html>
